name: examples

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'
      - 'rust/**'
      - 'c/**'
      - 'examples/**'
  push:
    branches:
      - main

concurrency:
  group: ${{ github.repository }}-${{ github.ref }}-${{ github.workflow }}-rust
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash -l -eo pipefail {0}

env:
  # At s2geometry updated to 0.13.0
  VCPKG_REF: 580d480f750618f8affeb77abbb956e6eeaee0ce

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        example:
          - sedonadb-rust
          - sedonadb-rust-pointcloud

    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0

    steps:
      - uses: actions/checkout@v6
      - name: Use stable Rust
        id: rust
        run: |
          rustup toolchain install stable --no-self-update
          rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          # Update this key to force a new cache
          prefix-key: "rust-${{ matrix.example }}-v5"

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y libgeos-dev

      - name: Build and run examples/${{ matrix.example }}
        shell: bash
        run: |
          cd examples/${{ matrix.example }}
          # Use current PR/branch commit instead of main branch
          if [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            REV="${{ github.event.pull_request.head.sha }}"
            REPO="${{ github.event.pull_request.head.repo.full_name }}"
          else
            REV="${{ github.sha }}"
            REPO="apache/sedona-db"
          fi
          sed -i "s|git = \"https://github.com/apache/sedona-db.git\"|git = \"https://github.com/${REPO}.git\", rev = \"${REV}\"|" Cargo.toml
          cat Cargo.toml
          cargo run
