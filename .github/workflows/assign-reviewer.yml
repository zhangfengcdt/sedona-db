# Captures PR metadata for the reviewer assignment workflow.
# The actual assignment is performed by assign-reviewer-write.yml
# (workflow_run trigger) which has write permission.
# See https://cwiki.apache.org/confluence/pages/viewpage.action?pageId=321719166

name: "Compute Reviewer Assignment"
on:
  pull_request:
    types: [opened]

jobs:
  compute:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.mkdirSync('pr-meta');
            fs.writeFileSync('pr-meta/number.txt', String(context.issue.number));
            fs.writeFileSync('pr-meta/author.txt', context.payload.pull_request.user.login);
      - uses: actions/upload-artifact@v4
        with:
          name: pr-meta
          path: pr-meta/
